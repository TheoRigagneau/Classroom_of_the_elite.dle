            </div>
        </div>

        <a class = "button"></a>
        <ul class= "valeur" id="currentCharacters">
            <li id ="name">Name</li>
            <li id ="genre">Genre</li>
            <li id ="age">Age</li>
            <li id ="classe">Classe</li>
            <li id ="annee">Annee</li>
            <li id ="statut">Statut</li>
            <li id ="importance_classe">Importance classe</li>
            <li id ="intelligence">Intelligence</li>
            <li id ="capa_physique">capacité physique</li>
            <li id ="arc_apparition">Arc apparition</li>
        </ul>
        <ul class= "valeur" id="formerCharacters"></ul>
    </body>
    <script src="index.js"></script>
